name: 🤖 CI

on:
  push:
    branches-ignore:
      - "release-please--**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  format:
    name: 🔤 Oxfmt
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 💅 Format check
        run: pnpm run format:check

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔬 Lint
        run: pnpm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔎 Type check
        run: pnpm run typecheck

  playwright:
    name: 🎭 Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: ⚙️ Build
        run: pnpm run build

      - name: 🔢 Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | tr ' ' '-')" >> $GITHUB_ENV

      - name: 📦 Cache Playwright binaries
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: 📥 Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: 🎭 Playwright tests
        run: pnpm exec playwright test

      - name: 📊 Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright/report/
          retention-days: 30

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, playwright]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: 🆕 Release Please
        id: release
        uses: googleapis/release-please-action@v4

  deploy:
    name: 🚢 Deploy
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.release_created == 'true'
    steps:
      - name: 🚀 Trigger Netlify Deploy
        run: curl -fsSL -X POST ${{ secrets.NETLIFY_DEPLOY_HOOK }}
